ekf_filter_node:
  ros__parameters:
    frequency: 20.0
    two_d_mode: true
    publish_tf: true

    # 프레임 설정
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    # 오도메트리 설정 (vx, vy, vyaw 사용)
    odom0: /odom_raw
    odom0_config: [false, false, false, # x, y, z
                   false, false, false, # roll, pitch, yaw
                   true,  true,  false, # vx, vy, vz
                   false, false, true,  # vroll, vpitch, vyaw
                   false, false, false] # ax, ay, az
    odom0_differential: true
    odom0_relative: false

    # IMU 설정 (yaw, vyaw 사용)
    imu0: /imu/data
    imu0_config: [false, false, false, # x, y, z
                  false, false, true,  # roll, pitch, yaw (yaw만 true)
                  false, false, false, # vx, vy, vz
                  false, false, true,  # vroll, vpitch, vyaw (vyaw만 true)
                  false, false, false] # ax, ay, az
    imu0_differential: true
    imu0_relative: false

    # 프로세스 노이즈 및 오차 행렬은 기본값 사용 (필요 시 추가 가능)
